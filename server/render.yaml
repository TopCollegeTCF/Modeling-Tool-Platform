services:
  - type: web
    name: 3d-modeler
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: 3d-modeler-db
          property: connectionString

databases:
  - name: 3d-modeler-db
    plan: free
    databaseName: modeler_db
    user: modeler_user